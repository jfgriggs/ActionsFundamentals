name: GitHub Actions Demo
on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - .github/**
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '15 6 * * 0'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: List workflow info
        run: |
          echo "Name of the event that triggered the workflow: ${{ github.event_name }}"
          echo "Name of the branch that the repository is currently referencing: ${{ github.ref }}"
      
      - uses: actions/checkout@v3.3.0
      
      - name: List files in the repository
        run: |
          echo "List all files in the repository ${{ github.repository }}"
          tree
